<!DOCTYPE html>
<html lang="en">
<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>CC API EXPLORER</title>
		<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
		<link rel="icon" type="image/png" href="favicon.png">
		<style>
				.background {
						position: fixed;
						top: 0;
						left: 0;
						width: 100%;
						height: 100vh;
						background: linear-gradient(135deg, #1f2937, #111827);
						overflow: hidden;
						z-index: -1;
						transition: background-color 1s ease-in-out;
				}
				.card {
						background: rgba(31, 41, 55, 0.9);
						backdrop-filter: blur(8px);
						-webkit-backdrop-filter: blur(8px);
						border-radius: 16px;
						box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
						border: 1px solid rgba(75, 85, 99, 0.5);
						transition: transform 0.3s ease, box-shadow 0.3s ease;
						color: #f3f4f6;
				}
				.card:hover {
						transform: translateY(-5px);
						box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
				}
				.side-menu {
						transition: transform 0.3s ease-in-out;
						transform: translateX(-100%);
						overflow-y: auto;
				}
				.side-menu.open {
						transform: translateX(0);
				}
				.hidden { display: none; }
				.toggle-btn-svg {
						transition: transform 0.3s ease-in-out;
				}
				.main-content {
						transition: opacity 0.3s ease-in-out;
				}
				.main-content.faded {
						opacity: 0.3;
				}
				.toggle-btn-svg .menu-line {
						transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out;
						transform-origin: center;
				}
				.toggle-btn-svg.active .top-line {
						transform: translateY(6px) rotate(45deg);
				}
				.toggle-btn-svg.active .middle-line {
						opacity: 0;
						transform: scaleX(0);
				}
				.toggle-btn-svg.active .bottom-line {
						transform: translateY(-6px) rotate(-45deg);
				}
				.api-category-button {
						transition: background-color 0.2s ease-in-out;
				}
				.api-category-content {
						overflow: hidden;
						max-height: 0;
						transition: max-height 0.3s ease-in-out;
				}
				.api-category-content.active {
						max-height: none;
				}
				.api-category-icon {
						transition: transform 0.3s ease-in-out;
				}
				.api-category-button.active .api-category-icon {
						transform: rotate(90deg);
				}
				@keyframes bounceIn {
						0%, 20%, 40%, 60%, 80%, 100% {
								transition-timing-function: cubic-bezier(0.215, 0.610, 0.355, 1.000);
						}
						0% {
								opacity: 0;
								transform: scale3d(0.3, 0.3, 0.3);
						}
						20% {
								transform: scale3d(1.1, 1.1, 1.1);
						}
						40% {
								transform: scale3d(0.9, 0.9, 0.9);
						}
						60% {
								opacity: 1;
								transform: scale3d(1.03, 1.03, 1.03);
						}
						80% {
								transform: scale3d(0.97, 0.97, 0.97);
						}
						100% {
								opacity: 1;
								transform: scale3d(1, 1, 1);
						}
				}
				.animate-bounce-in {
						animation: bounceIn 0.8s;
				}
				@keyframes fadeInUp {
						0% {
								opacity: 0;
								transform: translateY(20px);
						}
						100% {
								opacity: 1;
								transform: translateY(0);
						}
				}
				.animate-fade-in-up {
						animation: fadeInUp 0.5s ease-out forwards;
						opacity: 0;
				}
				.api-playground-container {
						position: fixed;
						top: 50%;
						left: 50%;
						z-index: 60;
						width: 90%;
						max-width: 700px;
						max-height: 90vh;
						overflow-y: auto;
						opacity: 0;
						transform: translate(-50%, -50%) scale(0.9);
						transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
						pointer-events: none;
				}
				.api-playground-container.open {
						opacity: 1;
						transform: translate(-50%, -50%) scale(1);
						pointer-events: auto;
				}
				.api-playground-container.closing {
						opacity: 0;
						transform: translate(-50%, -50%) scale(0.9);
						transition: opacity 0.3s ease-out, transform 0.3s ease-in;
				}
				.copy-button {
						position: sticky;
						float: right;
						top: 0.5rem;
						right: 0.5rem;
						padding: 0.25rem 0.5rem;
						font-size: 0.75rem;
						z-index: 10;
				}
		</style>
</head>
<body class="font-sans text-gray-100 bg-gray-900">

		<button id="toggle-menu-btn" class="fixed top-6 left-6 z-50 p-2 rounded-full bg-gray-800 shadow-lg text-gray-300 hover:bg-gray-700 focus:outline-none transition-transform duration-300">

						<path class="menu-line top-line" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16"></path>
						<path class="menu-line middle-line" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 12h16"></path>
						<path class="menu-line bottom-line" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 18h16"></path>
				</svg>
		</button>
		<div id="side-menu" class="side-menu fixed top-0 left-0 h-full w-64 p-6 bg-gray-800 shadow-xl z-40 overflow-y-auto">
				<h2 class="text-2xl font-bold mb-4 text-white">API Categories</h2>
				<div id="api-list" class="space-y-4">
						</div>
		</div>
		<div id="main-content" class="main-content flex flex-col items-center justify-center min-h-screen relative z-10 p-6">
				<div id="welcome-card" class="card p-8 w-full max-w-lg text-center animate-bounce-in">
						<h1 class="text-1xl sm:text-2xl font-extrabold text-white mb-6">Welcome to CC API Explorer</h1>
						<div id="device-info" class="text-sm text-gray-400 space-y-2 text-left">
								<p class="flex items-center"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-gray-500" viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" /><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h1a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 000-2H7zm3 0a1 1 0 000 2h3a1 1 0 000-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd" /></svg>Request API: <span id="request-count" class="font-light ml-2">Loading...</span></p>
								<p class="flex items-center"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-gray-500" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" /></svg>IP Address: <span id="ip" class="font-light ml-2">Loading...</span></p>
								<p class="flex items-center"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-gray-500" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l3 3a1 1 0 001.414-1.414L11 9.586V6z" clip-rule="evenodd" /></svg>Current Time: <span id="current-time" class="font-light ml-2">Loading...</span></p>
								<p class="flex items-center"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-gray-500" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.95 9.07a1 1 0 01.378-1.396l.191-.07A2 2 0 0115 7h1a2 2 0 012 2v2a2 2 0 01-2 2h-1c-.482 0-.94-.162-1.31-.444l-.225-.173a1 1 0 01-.137-1.354l.034-.055zm-8.837.94a1 1 0 00-.775-.826l-.21-.053A2 2 0 012 10v2a2 2 0 012 2h1c.538 0 1.05-.205 1.432-.574l.19-.188a1 1 0 00.088-1.29l-.04-.065zm2.842-1.996A1 1 0 018.663 8.1l.147-.058A2 2 0 0110.153 8h.694c.394 0 .772-.11 1.09-.313l.14-.094a1 1 0 01.127 1.39l-.035.056a.75.75 0 01-.264.382l-.08.064c-.314.25-.662.434-1.037.545a1 1 0 01-.397.026l-.286-.01A1 1 0 018.84 9.014z" clip-rule="evenodd" /></svg>User Agent: <span id="user-agent" class="font-light ml-2">Loading...</span></p>
								<p class="flex items-center"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-gray-500" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M17 5H7C5.89543 5 5 5.89543 5 7V17C5 18.1046 5.89543 19 7 19H17C18.1046 19 19 18.1046 19 17V7C19 5.89543 18.1046 5 17 5Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 10H20C19.4477 10 19 10.4477 19 11V13C19 13.5523 19.4477 14 20 14H22C22.5523 14 23 13.5523 23 13V11C23 10.4477 22.5523 10 22 10Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Battery Percentage: <span id="battery-level" class="font-light ml-2">Loading...</span></p>
						</div>
				</div>
		</div>
		<div id="api-playground" class="api-playground-container card p-6">
				<h2 id="playground-title" class="text-2xl font-bold mb-4 text-white">API Playground</h2>
				<div class="space-y-4">
						<div>
								<label class="block text-sm font-medium text-gray-400">Method</label>
								<input type="text" id="playground-method" class="mt-1 block w-full rounded-md border-gray-700 shadow-sm p-2 bg-gray-700 font-mono text-sm text-white" readonly>
						</div>
						<div>
								<label for="playground-base-url" class="block text-sm font-medium text-gray-400">Base URL (API Endpoint)</label>
								<input type="url" id="playground-base-url" class="mt-1 block w-full rounded-md border-gray-700 shadow-sm p-2 bg-gray-700 font-mono text-sm text-white" readonly>
						</div>
						<div id="parameter-inputs" class="space-y-3 p-3 bg-gray-700 rounded-lg border border-gray-600">
								<p class="text-sm text-gray-400">No URL Parameters found.</p>
						</div>
						<div id="request-url-box" class="relative p-2 rounded-lg bg-indigo-900 border border-indigo-700">
								<label class="block text-xs font-medium text-indigo-400 mb-1">Request URL</label>
								<div class="relative">
										<button onclick="copyToClipboard('requested-url-content', this)" class="copy-button bg-indigo-500 text-white text-xs rounded-full hover:bg-indigo-600 transition duration-300">Copy URL</button>

						</div>
						<div id="playground-result-container" class="relative bg-black p-4 rounded-lg text-white font-mono text-xs overflow-x-auto min-h-32">
								<div class="relative">
										<button id="copy-response-btn" onclick="copyToClipboard('playground-result-display', this)" class="copy-button bg-yellow-500 text-gray-900 text-xs rounded-full hover:bg-yellow-600 transition duration-300 hidden">Copy Response</button>

						</div>

						<button onclick="executeApiRequest()" class="px-4 py-2 bg-green-500 text-white text-sm rounded-full hover:bg-green-600 transition duration-300 ease-in-out transform hover:scale-105 shadow-md">Execute Request</button>
						<button onclick="closeApiPlayground()" class="px-4 py-2 bg-red-500 text-white text-sm rounded-full hover:bg-red-600 transition duration-300 ease-in-out transform hover:scale-105 shadow-md">Close</button>

		<div class="fixed bottom-4 left-1/2 -translate-x-1/2 text-xs text-white opacity-60">
				Dev: Jonell Hutchin Magallanes
		</div>
		<script>
				function copyToClipboard(elementId, button) {
						let textToCopy;
						const element = document.getElementById(elementId);
						if (element.tagName === 'TEXTAREA' || element.tagName === 'INPUT') {
								textToCopy = element.value;
						} else {
								textToCopy = element.textContent;
						}
						navigator.clipboard.writeText(textToCopy).then(() => {
								const originalText = button.textContent;
								button.textContent = 'Copied!';
								setTimeout(() => {
										button.textContent = originalText;
								}, 2000);
						}).catch(err => {
								console.error('Could not copy text: ', err);
						});
				}
				function updateTime() {
						const now = new Date();
						document.getElementById('current-time').textContent = `${now.toLocaleTimeString()}`;
				}
				function extractBaseUrlAndParams(fullUsage) {
						const parts = fullUsage.split('?');
						if (parts.length === 1) {
								return { baseUrl: parts[0], params: {} };
						}
						const baseUrl = parts[0];
						const queryString = parts[1];
						const params = {};
						if (queryString) {
								queryString.split('&').forEach(pair => {
										const [key, value] = pair.split('=');
										if (key) {
												params[decodeURIComponent(key)] = decodeURIComponent(value || '');
										}
								});
						}
						return { baseUrl, params };
				}
				function generateParameterInputs(params) {
						const container = document.getElementById('parameter-inputs');
						container.innerHTML = '';
						const paramKeys = Object.keys(params);
						if (paramKeys.length === 0) {
								container.innerHTML = '<p class="text-sm text-gray-400">No URL Parameters found. The URL uses a static path.</p>';
								return;
						}
						paramKeys.forEach(key => {
								const paramDiv = document.createElement('div');
								paramDiv.className = 'flex items-center space-x-2';
								paramDiv.innerHTML = `
										<label for="param-${key}" class="w-16 text-sm font-medium text-gray-300 truncate">${key}:</label>
										<input type="text" id="param-${key}" value="${params[key] || ''}" placeholder="${key}" class="flex-grow rounded-md border-gray-600 shadow-sm p-2 text-white font-mono text-sm focus:ring-indigo-500 focus:border-indigo-500 bg-gray-800">
								`;
								container.appendChild(paramDiv);
						});
				}
				function buildFinalUrl(baseUrl) {
						const container = document.getElementById('parameter-inputs');
						const paramInputs = container.querySelectorAll('input[id^="param-"]');
						let finalUrl = baseUrl;
						if (paramInputs.length === 0) {
								return finalUrl;
						}
					const params = [];
					paramInputs.forEach(input => {
						const key = input.id.replace('param-', '');
						const value = encodeURIComponent(input.value);
						params.push(`${key}=${value}`);
					});
					if (params.length > 0) {
						if (finalUrl.includes('?')) {
							finalUrl += `&${params.join('&')}`;
						} else {
							finalUrl += `?${params.join('&')}`;
						}
					}
					return finalUrl;
				}
				function tryApi(fullUsage, apiName, apiMethod) {
						const playground = document.getElementById('api-playground');
						const welcomeCard = document.getElementById('welcome-card');
						const { baseUrl, params } = extractBaseUrlAndParams(fullUsage);
						document.getElementById('playground-title').textContent = `${apiName} Playground`;
						document.getElementById('playground-method').value = apiMethod.toUpperCase();
						document.getElementById('playground-base-url').value = baseUrl;
						document.getElementById('playground-result-display').textContent = 'Click "Execute Request" to see results.';
						document.getElementById('playground-result-display').style.color = 'white';
						document.getElementById('copy-response-btn').classList.add('hidden');
						document.getElementById('requested-url-content').value = 'URL will appear here after execution.';
						generateParameterInputs(params);
						welcomeCard.classList.add('hidden');
						playground.classList.remove('closing');
						playground.classList.add('open');
				}
				function closeApiPlayground() {
						const playground = document.getElementById('api-playground');
						const welcomeCard = document.getElementById('welcome-card');
						playground.classList.add('closing');
						playground.classList.remove('open');
						setTimeout(() => {
								welcomeCard.classList.remove('hidden');
								document.getElementById('parameter-inputs').innerHTML = '';
								playground.classList.remove('closing');
						}, 300);
				}
				async function executeApiRequest() {
						const baseApiUrl = document.getElementById('playground-base-url').value;
						const resultContainer = document.getElementById('playground-result-container');
						const resultDisplay = document.getElementById('playground-result-display');
						const copyResponseBtn = document.getElementById('copy-response-btn');
						const requestedUrlTextarea = document.getElementById('requested-url-content');
						const method = document.getElementById('playground-method').value;
						const finalUrlWithParams = buildFinalUrl(baseApiUrl);
						let fullRequestedUrl = finalUrlWithParams;
						const hasProtocol = finalUrlWithParams.startsWith('http://') || finalUrlWithParams.startsWith('https://');

						try {
								if (!hasProtocol && finalUrlWithParams.startsWith('/')) {
										const urlObj = new URL(finalUrlWithParams, window.location.origin);
										fullRequestedUrl = urlObj.href;
								} else if (!hasProtocol) {
										const urlObj = new URL(finalUrlWithParams, window.location.origin + window.location.pathname);
										fullRequestedUrl = urlObj.href;
								} else {
										new URL(finalUrlWithParams);
										fullRequestedUrl = finalUrlWithParams;
								}
								requestedUrlTextarea.value = fullRequestedUrl;
						} catch (e) {
								requestedUrlTextarea.value = `Error generating URL: Invalid Base URL format. The URL used was: ${finalUrlWithParams}`;
								resultDisplay.textContent = requestedUrlTextarea.value;
								resultDisplay.style.color = 'red';
								return;
						}

						resultDisplay.innerHTML = 'Loading...';
						resultDisplay.style.color = 'white';
						resultDisplay.style.whiteSpace = 'pre-wrap';
						copyResponseBtn.classList.add('hidden');

						try {
								const response = await fetch(fullRequestedUrl, { method: method });
								const contentType = response.headers.get("content-type");

								if (!response.ok) {
										const errorDetails = await response.text();
										resultDisplay.style.color = 'red';
										resultDisplay.textContent = `Error: HTTP Status ${response.status}\n\nDetails: ${errorDetails.substring(0, 300)}...`;
										return;
								}

								if (contentType && contentType.includes("application/json")) {
										const data = await response.json();
										const prettyJson = JSON.stringify(data, null, 2);
										resultDisplay.textContent = prettyJson;
										resultDisplay.style.color = 'white';
										resultDisplay.style.whiteSpace = 'pre-wrap';
										copyResponseBtn.classList.remove('hidden');
								} else if (contentType && contentType.startsWith("image/")) {
										resultDisplay.innerHTML = `<img src="${fullRequestedUrl}" alt="API Image Response" style="max-width: 100%; height: auto; border-radius: 8px; margin-top: 1rem;">`;
										resultDisplay.style.whiteSpace = 'normal';
										copyResponseBtn.classList.add('hidden');
								} else if (contentType && contentType.startsWith("audio/")) {
										resultDisplay.innerHTML = `<audio controls src="${fullRequestedUrl}" style="width: 100%; margin-top: 1rem;"></audio><br><p class="text-xs text-gray-400">Audio file loaded from API response.</p>`;
										resultDisplay.style.whiteSpace = 'normal';
										copyResponseBtn.classList.add('hidden');
								} else if (contentType && contentType.startsWith("video/")) {
										resultDisplay.innerHTML = `<video controls src="${fullRequestedUrl}" style="max-width: 100%; height: auto; border-radius: 8px; margin-top: 1rem;"></video><br><p class="text-xs text-gray-400">Video file loaded from API response.</p>`;
										resultDisplay.style.whiteSpace = 'normal';
										copyResponseBtn.classList.add('hidden');
								} else if (contentType && contentType.includes("text/")) {
										const text = await response.text();
										resultDisplay.textContent = `Response is Text:\n${text}`;
										resultDisplay.style.color = 'white';
										resultDisplay.style.whiteSpace = 'pre-wrap';
										copyResponseBtn.classList.remove('hidden');
								} else {
										const text = await response.text();
										resultDisplay.textContent = `Response is of type: ${contentType || 'Unknown'}. Status: ${response.status}. Showing raw data:\n\n${text.substring(0, 500)}...`;
										resultDisplay.style.color = 'yellow';
										resultDisplay.style.whiteSpace = 'pre-wrap';
										copyResponseBtn.classList.add('hidden');
								}
						} catch (error) {
								resultDisplay.textContent = `Execution Failed: ${error.message}`;
								resultDisplay.style.color = 'red';
								resultDisplay.style.whiteSpace = 'pre-wrap';
								copyResponseBtn.classList.add('hidden');
						}
				}
				document.addEventListener("DOMContentLoaded", function() {
						const toggleBtn = document.getElementById("toggle-menu-btn");
						const sideMenu = document.getElementById("side-menu");
						const mainContent = document.getElementById("main-content");
						const toggleSvg = toggleBtn.querySelector('.toggle-btn-svg');
						const background = document.getElementById('background');
						const batteryLevelSpan = document.getElementById('battery-level');
						const apiListContainer = document.getElementById('api-list');
						const darkColors = [
								['#1f2937', '#111827'],
								['#374151', '#1f2937'],
								['#111827', '#374151'],
						];
						function setRandomDarkGradient() {
								const randomIndex = Math.floor(Math.random() * darkColors.length);
								const [startColor, endColor] = darkColors[randomIndex];
								background.style.background = `linear-gradient(135deg, ${startColor}, ${endColor})`;
						}
						setRandomDarkGradient();
						toggleBtn.addEventListener("click", () => {
								const isMenuOpen = sideMenu.classList.toggle("open");
								if (isMenuOpen) {
										toggleSvg.classList.add("active");
										mainContent.classList.add("faded");
										document.querySelectorAll('#api-list .animate-bounce-in').forEach((item, index) => {
												item.style.animationDelay = `${0.1 * index}s`;
												item.classList.add('animate-bounce-in');
										});
								} else {
										toggleSvg.classList.remove("active");
										mainContent.classList.remove("faded");
										document.querySelectorAll('#api-list .animate-bounce-in').forEach(item => {
												item.classList.remove('animate-bounce-in');
												item.style.animationDelay = '';
										});
								}
						});
						if ('getBattery' in navigator) {
								navigator.getBattery().then(function(battery) {
										function updateBatteryStatus() {
												const level = Math.round(battery.level * 100);
												batteryLevelSpan.textContent = `${level}%`;
												const batteryIcon = batteryLevelSpan.previousElementSibling;
												if (battery.charging) {
														batteryIcon.style.fill = '#4CAF50';
												} else if (level <= 20) {
														batteryIcon.style.fill = '#F44336';
												} else {
														batteryIcon.style.fill = '#9CA3AF';
												}
										}
										updateBatteryStatus();
										battery.addEventListener('levelchange', updateBatteryStatus);
										battery.addEventListener('chargingchange', updateBatteryStatus);
								});
						} else {
								batteryLevelSpan.textContent = 'Not supported';
						}
						fetch('/jonellmagallanes')
								.then(response => response.json())
								.then(data => {
										const apiList = document.getElementById('api-list');
										const categories = {};
										 const categoryIcons = {
												'News': `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v12a2 2 0 01-2 2z" /></svg>`,
												'Tools': `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-purple-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`,
												'Entertainment': `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.176l-3.328 1.874a1 1 0 00-.472.846v3.256c0 .486.29.93.743 1.12l3.328 1.874c.48.27.994.41 1.517.41h.001c.49 0 .963-.15 1.34-.41l3.328-1.874c.453-.27.743-.724.743-1.12v-3.256a1 1 0 00-.472-.846l-3.328-1.874a2 2 0 00-1.04-1.176z" /></svg>`,
												'Social': `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.172-1.172m-1.172-3.328a4 4 0 00-5.656-5.656L3.95 10.95a4 4 0 105.656 5.656l-1.172-1.172" /></svg>`,
											    'Default': `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
	<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4C6 6 6 8 6 8s0 2 1 4-1 4-1 4s0 2 1 4" />
	<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 4c1.0 2 1 4 1 4s0 2-1 4 1 4 1 4s0 2-1 4" />
	<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8l-1 3h2l-1 3" />
</svg>`,
										};

										data.forEach(api => {
												if (!categories[api.category]) {
														categories[api.category] = [];
												}
												categories[api.category].push(api);
										});

										const sortedCategories = Object.keys(categories).sort();

										sortedCategories.forEach((category, categoryIndex) => {
												const categoryDiv = document.createElement('div');
												categoryDiv.className = 'w-full mb-2';

												const categoryButton = document.createElement('button');
												categoryButton.className = "flex items-center justify-between w-full p-4 rounded-lg bg-gray-700 hover:bg-gray-600 transition duration-300 ease-in-out cursor-pointer animate-bounce-in";
												categoryButton.style.animationDelay = `${0.1 * categoryIndex}s`;
												categoryButton.innerHTML = `
														<div class="flex items-center space-x-3">
																${categoryIcons[category] || categoryIcons['Default']}
																<h3 class="font-medium text-white">${category}</h3>
														</div>
														<svg class="api-category-icon h-5 w-5 text-gray-300 transform transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>,
			};
										data.forEach(api => {
												if (!categories[api.category]) {
														categories[api.category] = [];
												}
												categories[api.category].push(api);
										});
										const sortedCategories = Object.keys(categories).sort();
										sortedCategories.forEach((category, categoryIndex) => {
												const categoryDiv = document.createElement('div');
												categoryDiv.className = 'w-full mb-2';
												const categoryButton = document.createElement('button');
												categoryButton.className = "flex items-center justify-between w-full p-4 rounded-lg bg-gray-700 hover:bg-gray-600 transition duration-300 ease-in-out cursor-pointer animate-bounce-in";
												categoryButton.style.animationDelay = `${0.1 * categoryIndex}s`;
												categoryButton.innerHTML = `
														<div class="flex items-center space-x-3">
																${categoryIcons[category] || categoryIcons['Default']}
																<h3 class="font-medium text-white">${category}</h3>
														</div>
														<svg class="api-category-icon h-5 w-5 text-gray-300 transform transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
												`;
												const categoryContent = document.createElement('div');
												categoryContent.className = 'api-category-content space-y-4 pt-4';
												categories[category].forEach((api, apiIndex) => {
														const fullUsage = `${api.usages}${api.query || ''}`;
														const apiItem = document.createElement('div');
														apiItem.className = 'p-4 rounded-lg bg-gray-800 border border-gray-700 shadow-sm hover:shadow-md transition-shadow duration-300 animate-fade-in-up';
														
														apiItem.style.animationDelay = `${0.1 * (apiIndex + 1)}s`;
														
														apiItem.innerHTML = `
																<h4 class="font-semibold text-white">${api.name}</h4>
																<p class="text-sm text-gray-400 my-1">${api.desc}</p>
																<p class="text-xs text-gray-500">Method: <span class="uppercase font-mono">${api.method}</span></p>
																<p class="text-xs text-gray-500">Usage: <a href="${fullUsage}" class="text-indigo-400 hover:underline break-words">${fullUsage}</a></p>
																<button onclick="tryApi('${fullUsage}', '${api.name}', '${api.method}')" class="mt-3 px-4 py-2 bg-indigo-500 text-white text-sm rounded-full hover:bg-indigo-600 transition duration-300 ease-in-out transform hover:scale-105 shadow-md">Try</button>
														`;
														categoryContent.appendChild(apiItem);
												});
												categoryButton.onclick = () => {
														const isActive = categoryContent.classList.toggle('active');
														categoryButton.classList.toggle('active');
														if (isActive) {
																categoryContent.querySelectorAll('.animate-fade-in-up').forEach((item, index) => {
																		item.classList.remove('animate-fade-in-up');
																		void item.offsetWidth;
																		item.style.animationDelay = `${0.1 * (index + 1)}s`;
																		item.classList.add('animate-fade-in-up');
																});
														}
												};
												categoryDiv.appendChild(categoryButton);
												categoryDiv.appendChild(categoryContent);
												apiList.appendChild(categoryDiv);
										});
								})
								.catch(error => {
										apiListContainer.innerHTML = `<p class="text-sm text-red-400">Failed to load API list: ${error.message}</p>`;
								});
						setInterval(updateTime, 1000);
						updateTime();
						document.getElementById('user-agent').textContent = navigator.userAgent;
						fetch('https://api.ipify.org?format=json')
								.then(response => response.json())
								.then(data => {
										document.getElementById('ip').textContent = data.ip;
								})
								.catch(() => {
										document.getElementById('ip').textContent = 'N/A';
								});
						fetch('/requests')
								.then(response => response.json())
								.then(data => {
										document.getElementById('request-count').textContent = data.count.toLocaleString();
								})
								.catch(() => {
										document.getElementById('request-count').textContent = 'Error';
								});
				});
		</script>
</body>
