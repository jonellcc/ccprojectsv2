<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonell Hutchin Magallanes | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f8fafc;
            --accent: #2563eb;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus+Jakarta+Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #f1f5f9 0%, #e2e8f0 100%);
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.1) 0%, rgba(147, 197, 253, 0.1) 100%);
            filter: blur(80px);
            border-radius: 50%;
            animation: move 20s infinite alternate ease-in-out;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) rotate(0deg); }
            to { transform: translate(20%, 20%) rotate(360deg); }
        }

        .portfolio-card {
            width: 100%;
            max-width: 480px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.7);
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .avatar-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            position: relative;
            padding: 6px;
            background: var(--white);
            border-radius: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 34px;
            object-fit: cover;
            display: block;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 6px;
            color: #0f172a;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #0f172a;
            color: var(--white);
            padding: 16px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 24px 0 32px;
        }

        .action-btn:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .section-title {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.5);
            padding: 18px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            margin-bottom: 12px;
        }

        .info-box h4 {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .info-box p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .skills-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 32px;
        }

        .skill {
            background: var(--white);
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-dark);
            border: 1px solid #e2e8f0;
        }

        .socials {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .social-link {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--white);
            border-radius: 16px;
            color: #0f172a;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
        }

        .social-link:hover {
            background: #0f172a;
            color: var(--white);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="blob"></div>
        <div class="blob" style="right: -10%; bottom: -10%; animation-delay: -5s; width: 600px;"></div>
    </div>

    <main class="portfolio-card">
        <header class="header">
            <div class="avatar-container">
                <img src="https://graph.facebook.com/100036956043695/picture?width=720&height=720&access_token=6628568379%7Cc1e620fa708a1d5696fb991c1bde5662" alt="Jonell Hutchin Magallanes" class="avatar-img">
            </div>
            <h1>Jonell Hutchin Magallanes</h1>
            <p class="subtitle">Backend Developer | BS Information Systems</p>
        </header>

        <a href="/docs" class="action-btn">
            <i class="fas fa-rocket"></i>
            <span>REST API Documentation</span>
        </a>

        <span class="section-title">Education</span>
        <div class="info-box">
            <h4>I Tech Bago City College</h4>
            <p>Bachelor of Science in Information Systems</p>
        </div>
        <div class="info-box">
            <h4>San Enrique Polytechnic Academy Inc.</h4>
            <p>Senior High School - TVL Track</p>
        </div>

        <span class="section-title">Technical Skills</span>
        <div class="skills-wrap">
            <div class="skill">Node.js</div>
            <div class="skill">PHP</div>
            <div class="skill">SQL</div>
            <div class="skill">HTML/CSS</div>
        </div>

        <span class="section-title">Connect</span>
        <footer class="socials">
            <a href="https://www.facebook.com/hutchingdcc10" class="social-link"><i class="fab fa-facebook-f"></i></a>
            <a href="https://m.me/100036956043695" class="social-link"><i class="fab fa-facebook-messenger"></i></a>
            <a href="https://discord.com/users/910196206414753792" class="social-link"><i class="fab fa-discord"></i></a>
            <a href="https://github.com/jonellcc" class="social-link"><i class="fab fa-github"></i></a>
        </footer>
    </main>

</body>
</html>
